<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="신동탄간호학원 갤러리. 교육 현장과 학원 시설 사진을 확인하세요.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - 갤러리 - 신동탄간호학원</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="common-pages.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    /* 게시판 카드 hover 부유 효과 비활성화 */
    .content-card:hover {
      transform: none;
      box-shadow: var(--shadow-lg);
    }

    .board-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 1.2rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid #e9ecef;
    }

    .board-controls-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .total-posts {
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 600;
      padding: 0.35rem 0.8rem;
      background: #e7eaf0;
      border-radius: 6px;
    }

    .search-bar {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .search-bar select,
    .search-bar input {
      padding: 0.55rem 0.9rem;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--primary);
      background: #fff;
      cursor: pointer;
    }

    .search-bar input {
      color: #212529;
      width: 200px;
    }

    .search-bar select:focus,
    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26,54,93,0.1);
    }

    .search-bar button {
      padding: 0.55rem 1.2rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .search-bar button:hover {
      background: var(--primary-dark);
    }

    .divider {
      width: 1px;
      height: 22px;
      background: #dee2e6;
      flex-shrink: 0;
    }

    /* 갤러리 그리드 */
    .board-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .board-row {
      display: flex;
      flex-direction: column;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      background: #fff;
    }

    .board-row:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(26,54,93,0.12);
      border-color: var(--primary);
    }

    /* 썸네일 래퍼 (script.js가 <a>로 감쌈) */
    .board-row > a {
      display: block;
      overflow: hidden;
      flex-shrink: 0;
    }

    .board-row .thumbnail {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .board-row:hover .thumbnail {
      transform: scale(1.04);
    }

    .board-row .title-section {
      padding: 1rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .board-row .title-section .title {
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.97rem;
      line-height: 1.4;
      word-break: keep-all;
      transition: color 0.2s;
    }

    .board-row .title-section .title:hover {
      color: var(--primary-dark);
    }

    .board-row .title-section .description {
      font-size: 0.85rem;
      color: #6c757d;
      line-height: 1.5;
      margin-bottom: 0.7rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .board-row .meta-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: auto;
      padding-top: 0.6rem;
      border-top: 1px solid #f0f0f0;
    }

    .board-bottom {
      display: flex;
      justify-content: center;
      padding-top: 0.5rem;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.3rem;
    }

    .pagination button {
      width: 36px;
      height: 36px;
      border: 1px solid #e9ecef;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #495057;
    }

    .pagination button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 반응형 */
    @media (max-width: 992px) {
      .board-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    @media (max-width: 768px) {
      .board-controls {
        flex-direction: column;
        align-items: stretch;
        gap: 0.8rem;
        padding: 0 0 1rem;
      }
      .board-controls-left {
        justify-content: space-between;
      }
      .search-bar {
        flex-direction: column;
        gap: 0.6rem;
        width: 100%;
      }
      .search-bar select,
      .search-bar input,
      .search-bar button {
        width: 100%;
        min-width: 0;
      }
      .divider { display: none; }

      .pagination button {
        width: 32px;
        height: 32px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 576px) {
      .board-list {
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }
      .board-row .title-section .description {
        -webkit-line-clamp: 1;
      }
    }

    /* Quick Contact Sidebar */
    .quick-contact-sidebar {
      position: fixed;
      top: 50%;
      right: 40px;
      width: 240px;
      z-index: 100;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
      transform: translateY(-50%);
    }
    .contact-box {
      margin-bottom: 1rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .contact-box h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--primary);
    }
    .contact-box .phone-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }
    .contact-box .kakao-link {
      display: block;
      background-color: #ffeb00;
      padding: 1rem;
      text-decoration: none;
      color: #3c1e1e;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .contact-box .kakao-link:hover {
      background-color: #fdd835;
    }
    @media (max-width: 1200px) {
      .quick-contact-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <main id="main-content">
    <section class="page-section">
      <div class="container">
        <div class="content-card">
          <div class="board-controls">
            <div class="board-controls-left">
              <div class="total-posts" id="total-posts-counter">전체 0건</div>
            </div>
            <div class="search-bar">
              <select id="sort-order">
                <option value="created_at_desc">최신순</option>
                <option value="created_at_asc">오래된순</option>
                <option value="views_desc">조회수순</option>
                <option value="title_asc">제목순</option>
              </select>
              <div class="divider"></div>
              <select id="gallery-search-type">
                <option value="title">제목</option>
                <option value="content">내용</option>
                <option value="title_content">제목+내용</option>
              </select>
              <input type="text" id="gallery-search-input" placeholder="검색어를 입력하세요">
              <button id="gallery-search-btn">
                <i class="fas fa-search"></i> 검색
              </button>
            </div>
          </div>

          <div class="board-list" id="gallery-list">
            <!-- 게시물 목록이 여기에 동적으로 삽입됩니다. -->
          </div>

          <div class="board-bottom">
            <div class="pagination" id="pagination">
              <!-- 페이지네이션 버튼이 여기에 동적으로 삽입됩니다. -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="quick-contact-sidebar">
    <div class="contact-box">
      <h3>문의 전화</h3>
      <p class="phone-number"><i class="fas fa-phone-alt"></i> 031) 8003-2456</p>
    </div>
    <div class="contact-box" style="padding: 0;">
      <a href="https://pf.kakao.com/_ExlqgC" target="_blank" class="kakao-link"><strong>KakaoTalk</strong> <span>플러스 친구</span></a>
    </div>
  </aside>

  <footer class="footer"></footer>

  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
