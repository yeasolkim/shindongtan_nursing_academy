<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="신동탄간호학원 강사진 소개. 풍부한 현장 경력을 갖춘 전문 강사진을 만나보세요.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강사진 소개 - 신동탄간호학원</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="common-pages.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="instructors.css">
  <style>
    @media (max-width: 768px) {
      /* ===== 강사 상세화면 모바일: 패딩/마진 극한 최소화 ===== */
      .content-card {
        padding: 0.1rem !important;
        margin: 0 !important;
      }
      #instructor-detail-view {
        padding: 0.1rem 0 !important;
        margin: 0 !important;
      }
      .instructor-detail-card,
      .instructor-detail-content,
      .instructor-detail-header,
      .instructor-detail-body {
        padding: 0.05rem !important;
        margin: 0 !important;
      }
      .instructor-detail-card img {
        max-width: 100%;
        height: auto;
        margin-bottom: 0.05rem !important;
      }
      .instructor-detail-title,
      .instructor-detail-name,
      .instructor-detail-desc {
        margin: 0.05rem 0 !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <!-- 메인 콘텐츠 -->
  <main>
    <section class="page-section" id="instructors-section">
      <div class="container">
        <div class="content-card">
          <!-- 강사 목록 뷰 -->
          <div id="instructor-list-view">
            <div class="section-title">
              <h2>전문 강사진</h2>
              <p>풍부한 경험과 전문성을 갖춘 강사진</p>
            </div>
            <div class="card-content">
              <div id="instructor-grid" class="instructor-grid">
                <!-- 강사 카드 여기에 동적으로 추가됩니다. -->
              </div>
            </div>
          </div>

          <!-- 강사 상세 정보 뷰 (초기에는 숨겨짐) -->
          <div id="instructor-detail-view" style="display: none;">
            <!-- 상세 정보 여기에 동적으로 추가됩니다. -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- COMP-FOOTER-01: 글로벌 푸터 -->
  <footer class="footer"></footer>

  <!-- Supabase 스크립트 추가 -->
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
