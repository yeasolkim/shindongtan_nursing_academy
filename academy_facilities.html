  <style>
    /* 게시판 카드 hover 부유 효과 비활성화 */
    .content-card:hover {
      transform: none;
      box-shadow: var(--shadow-lg);
    }

    .slider-wrapper {
      max-width: 900px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    .slider-wrapper.loaded {
      opacity: 1;
    }
    .slider-main {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background-color: #f1f5f9;
    }
    .slider-main-image {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      transition: opacity 0.2s ease;
    }
    .slider-main-image.fading {
      opacity: 0;
    }
    .slider-nav {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 1.5rem;
      box-sizing: border-box;
      pointer-events: none;
    }
    .slider-nav button {
      background: rgba(26, 54, 93, 0.7);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      transition: all 0.3s ease;
    }
    .slider-nav button:hover {
      background: var(--primary);
      transform: scale(1.1);
    }
    .slider-counter {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .slider-thumbnails {
      display: flex;
      margin-top: 1.5rem;
      gap: 10px;
      overflow-x: auto;
      padding: 0.5rem 0.25rem;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
      -webkit-overflow-scrolling: touch;
    }
    .slider-thumbnails::-webkit-scrollbar {
      height: 4px;
    }
    .slider-thumbnails::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 2px;
    }
    .thumbnail {
      width: 110px;
      height: 74px;
      flex-shrink: 0;
      object-fit: cover;
      cursor: pointer;
      border-radius: var(--radius-sm);
      border: 3px solid transparent;
      opacity: 0.6;
      filter: grayscale(40%);
    }
    .thumbnail.active {
      border-color: var(--primary);
      opacity: 1;
      filter: grayscale(0);
      box-shadow: 0 0 0 2px rgba(26, 54, 93, 0.3);
    }
    .slider-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: #94a3b8;
    }
    .slider-empty i {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .slider-main-image {
        aspect-ratio: 4 / 3;
      }
      .slider-nav button {
        width: 40px;
        height: 40px;
        font-size: 0.9rem;
      }
      .slider-nav {
        padding: 0 1rem;
      }
      .thumbnail {
        width: 90px;
        height: 60px;
      }
      .slider-thumbnails {
        gap: 8px;
      }
    }

    @media (max-width: 480px) {
      .content-card {
        padding: 1.5rem 0.5rem;
      }
      .slider-main-image {
        aspect-ratio: 4 / 3;
      }
      .slider-nav button {
        width: 36px;
        height: 36px;
        font-size: 0.85rem;
      }
      .slider-thumbnails {
        margin-top: 1rem;
        gap: 6px;
      }
      .thumbnail {
        width: 72px;
        height: 48px;
        border-radius: 6px;
      }
    }

    /* Quick Contact Sidebar */
    .quick-contact-sidebar {
      position: fixed;
      top: 50%;
      right: 40px;
      width: 240px;
      z-index: 100;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
      transform: translateY(-50%);
    }
    .contact-box {
      margin-bottom: 1rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .contact-box h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--primary);
    }
    .contact-box .phone-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }
    .contact-box .kakao-link {
      display: block;
      background-color: #ffeb00;
      padding: 1rem;
      text-decoration: none;
      color: #3c1e1e;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .contact-box .kakao-link:hover {
      background-color: #fdd835;
    }
    @media (max-width: 1200px) {
      .quick-contact-sidebar { display: none; }
    }
  </style>

<body>
  <div id="page-loader" aria-hidden="true">
    <div class="loader-wrap">
      <div class="loader-rings"><span></span><span></span><span></span><div class="loader-dot"></div></div>
      <p class="loader-brand">신동탄간호학원</p>
    </div>
  </div>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <!-- 메인 콘텐츠 -->
  <main id="main-content">
    <section class="page-section">
      <div class="container">
        <div class="content-card">
          <div class="card-content">
            <div class="slider-wrapper" id="facilities-slider" role="region" aria-label="시설 사진">
              <div class="slider-main">

                  <button id="slider-prev-btn" aria-label="이전 사진"><i class="fas fa-chevron-left"></i></button>

    </div>

  <!-- COMP-FOOTER-01: 글로벌 푸터 -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js" defer></script>
  <script src="supabase-config.js" defer></script>
  <script>
  async function loadFacilityImages() {
    if (!window.supabaseClient) return;
    const { data: facilities, error } = await window.supabaseClient
      .from('facilities')
      .select('*')
      .order('order', { ascending: true });

    const slider = document.getElementById('facilities-slider');

    if (error || !facilities || !facilities.length) {
      slider.innerHTML = `
        <div class="slider-empty">
          <i class="fas fa-images"></i>
          <p>등록된 시설 사진이 없습니다.</p>
        </div>`;
      slider.classList.add('loaded');
      return;
    }

    renderFacilitySlider(facilities);
  }

  function renderFacilitySlider(facilities) {
    const mainImg = document.getElementById('slider-main-image');
    const thumbnails = document.getElementById('slider-thumbnails');
    const counter = document.getElementById('slider-counter');
    let current = 0;

    function show(idx) {
      current = (idx + facilities.length) % facilities.length;

      // 페이드 전환
      mainImg.classList.add('fading');
      setTimeout(() => {
        mainImg.src = facilities[current].image_url;
        mainImg.alt = facilities[current].alt || '학원 시설';
        mainImg.classList.remove('fading');
      }, 200);

      // 카운터 업데이트
      if (counter) counter.textContent = `${current + 1} / ${facilities.length}`;

      // 썸네일 활성화 + 가로 스크롤 위치 맞춤
      Array.from(thumbnails.children).forEach((thumb, i) => {
        thumb.classList.toggle('active', i === current);
        if (i === current) {
          thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      });
    }

    // 썸네일 렌더링
    thumbnails.innerHTML = '';
    facilities.forEach((item, idx) => {
      const thumb = document.createElement('img');
      thumb.src = item.image_url;
      thumb.alt = item.alt || '';
      thumb.loading = 'lazy';
      thumb.className = 'thumbnail';
      thumb.addEventListener('click', () => show(idx));
      thumbnails.appendChild(thumb);
    });

    show(0);

    document.getElementById('slider-prev-btn').onclick = () => show(current - 1);
    document.getElementById('slider-next-btn').onclick = () => show(current + 1);

    // 키보드 네비게이션
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') show(current - 1);
      if (e.key === 'ArrowRight') show(current + 1);
    });

    // 모바일 스와이프
    let touchStartX = 0;
    const sliderEl = document.getElementById('facilities-slider');
    sliderEl.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    sliderEl.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) show(diff > 0 ? current + 1 : current - 1);
    }, { passive: true });

    document.getElementById('facilities-slider').classList.add('loaded');
  }

  document.addEventListener('DOMContentLoaded', loadFacilityImages);
  </script>

  <script src="script.js" defer></script>
