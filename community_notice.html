<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="신동탄간호학원 공지사항. 학원의 주요 소식과 안내사항을 확인하세요.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - 공지사항 - 신동탄간호학원</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="common-pages.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* 게시판 카드 hover 부유 효과 비활성화 */
    .content-card:hover {
      transform: none;
      box-shadow: var(--shadow-lg);
    }

    .board-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 1.2rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid #e9ecef;
    }

    .board-controls-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .total-posts {
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 600;
      padding: 0.35rem 0.8rem;
      background: #e7eaf0;
      border-radius: 6px;
    }

    .items-per-page {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .items-per-page label {
      font-size: 0.9rem;
      color: #495057;
      font-weight: 500;
    }

    .items-per-page select {
      padding: 0.4rem 0.7rem;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--primary);
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .items-per-page select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26,54,93,0.1);
    }

    .search-bar {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .search-bar select, .search-bar input {
      padding: 0.55rem 0.9rem;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar select:focus, .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26,54,93,0.1);
    }

    .search-bar select {
      width: 110px;
      color: var(--primary);
      background: #fff;
      cursor: pointer;
    }

    .search-bar input {
      width: 240px;
      color: #212529;
    }

    .search-bar button {
      padding: 0.55rem 1.2rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .search-bar button:hover {
      background: var(--primary-dark);
    }

    .board-list {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e9ecef;
      overflow: hidden;
    }

    .board-header, .board-row {
      display: grid;
      grid-template-columns: 80px 1fr 120px 120px 80px;
      text-align: center;
      padding: 1rem 0;
      border-bottom: 1px solid #e9ecef;
      align-items: center;
      transition: background 0.15s;
    }

    .board-header {
      font-weight: 700;
      background: #f5f7fa;
      color: var(--primary);
      font-size: 0.9rem;
      border-bottom: 2px solid #dde2ea;
    }

    .board-row {
      background: #fff;
    }

    .board-row:last-child {
      border-bottom: none;
    }

    .board-row:hover {
      background: #f8f9fa;
    }

    .board-row .title {
      text-align: left;
      padding: 0 1.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .board-row .title a {
      color: #334a6c;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .board-row .title a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .board-row.notice {
      background: #fff9f9;
      font-weight: 600;
      border-left: 3px solid #fecaca;
    }

    .board-row.notice:hover {
      background: #fff3f3;
    }

    .board-row.notice .number {
      display: inline-block;
      font-size: 0.73rem;
      font-weight: 700;
      color: #d92121;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 5px;
      padding: 0.15rem 0.5rem;
    }

    .board-bottom {
      display: flex;
      justify-content: center;
      padding: 1.5rem 0 0;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.3rem;
    }

    .pagination button {
      width: 36px;
      height: 36px;
      border: 1px solid #e9ecef;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #495057;
    }

    .pagination button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 반응형 */
    @media (max-width: 1200px) {
      .board-header, .board-row {
        grid-template-columns: 70px 1fr 100px 100px 70px;
      }
    }

    @media (max-width: 992px) {
      .board-header, .board-row {
        grid-template-columns: 60px 1fr 100px 100px;
      }
      .board-header .views, .board-row .views { display: none; }
    }

    @media (max-width: 768px) {
      .board-header, .board-row {
        grid-template-columns: 42px 1fr;
        padding: 0.8rem 0;
        font-size: 0.9rem;
      }
      .board-header .author, .board-row .author,
      .board-header .date, .board-row .date,
      .board-header .views, .board-row .views { display: none !important; }

      .board-row .title {
        white-space: normal;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
        line-height: 1.3;
      }
      .mobile-date {
        display: block;
        font-size: 0.75rem;
        color: #888;
        margin-top: 2px;
        letter-spacing: -0.5px;
      }
      .board-row.notice .number {
        font-size: 0.68rem;
        padding: 0.12rem 0.4rem;
      }

      .board-controls {
        flex-direction: column;
        align-items: stretch;
        gap: 0.8rem;
        padding: 0 0 1rem;
      }
      .board-controls-left {
        justify-content: space-between;
      }
      .search-bar {
        width: 100%;
        flex-direction: column;
        gap: 0.6rem;
      }
      .search-bar select, .search-bar input, .search-bar button {
        width: 100%;
        padding: 0.75rem;
        font-size: 0.95rem;
      }

      .pagination button {
        width: 32px;
        height: 32px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 576px) {
      .board-header, .board-row {
        grid-template-columns: 38px 1fr;
        font-size: 0.85rem;
        padding: 0.65rem 0;
      }
      .board-row .title {
        padding: 0 0.5rem;
        font-size: 0.85rem;
      }
      .board-row.notice .number {
        font-size: 0.65rem;
        padding: 0.1rem 0.35rem;
      }
      .search-bar select, .search-bar input, .search-bar button {
        padding: 0.65rem;
        font-size: 0.9rem;
      }
      .pagination button {
        width: 30px;
        height: 30px;
        font-size: 0.82rem;
      }
    }

    @media (max-width: 480px) {
      .board-header, .board-row {
        grid-template-columns: 34px 1fr;
        font-size: 0.8rem;
        padding: 0.55rem 0;
      }
      .board-row .title {
        padding: 0 0.3rem;
        font-size: 0.8rem;
      }
    }

    /* Quick Contact Sidebar */
    .quick-contact-sidebar {
      position: fixed;
      top: 50%;
      right: 40px;
      width: 240px;
      z-index: 100;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
      transform: translateY(-50%);
    }
    .contact-box {
      margin-bottom: 1rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .contact-box h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--primary);
    }
    .contact-box .phone-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }
    .contact-box .kakao-link {
      display: block;
      background-color: #ffeb00;
      padding: 1rem;
      text-decoration: none;
      color: #3c1e1e;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .contact-box .kakao-link:hover {
      background-color: #fdd835;
    }
    @media (max-width: 1200px) {
      .quick-contact-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <main id="main-content">
    <section class="page-section">
      <div class="container">
        <div class="content-card">
          <div class="board-controls">
            <div class="board-controls-left">
              <div class="total-posts" id="total-posts-counter">전체 0개</div>
              <div class="items-per-page">
                <label for="items-per-page-select">보기:</label>
                <select id="items-per-page-select">
                  <option value="10">10개씩</option>
                  <option value="20">20개씩</option>
                  <option value="50">50개씩</option>
                </select>
              </div>
            </div>
            <div class="search-bar">
              <select id="notice-search-type" aria-label="검색 분류">
                <option value="title">제목</option>
                <option value="content">내용</option>
                <option value="title_content">제목+내용</option>
              </select>
              <input type="text" id="notice-search-input" placeholder="검색어를 입력하세요" aria-label="검색어 입력">
              <button id="notice-search-btn" aria-label="검색">
                <i class="fas fa-search"></i> 검색
              </button>
            </div>
          </div>

          <div class="board-list" id="notice-list">
            <div class="board-header">
              <div class="number">번호</div>
              <div class="title">제목</div>
              <div class="author">작성자</div>
              <div class="date">날짜</div>
              <div class="views">조회</div>
            </div>
            <!-- 게시물 목록이 여기에 동적으로 삽입됩니다. -->
          </div>

          <div class="board-bottom">
            <div class="pagination" id="pagination">
              <!-- 페이지네이션 버튼이 여기에 동적으로 삽입됩니다. -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="quick-contact-sidebar">
    <div class="contact-box">
      <h3>문의 전화</h3>
      <p class="phone-number"><i class="fas fa-phone-alt"></i> 031) 8003-2456</p>
    </div>
    <div class="contact-box" style="padding: 0;">
      <a href="https://pf.kakao.com/_ExlqgC" target="_blank" class="kakao-link"><strong>KakaoTalk</strong> <span>플러스 친구</span></a>
    </div>
  </aside>

  <footer class="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
