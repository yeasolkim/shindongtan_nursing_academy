<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="신동탄간호학원 Q&A. 수강생들이 자주 묻는 질문과 답변을 모았습니다.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - Q&A - 신동탄간호학원</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="common-pages.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* 게시판 카드 hover 부유 효과 비활성화 */
    .content-card:hover {
      transform: none;
      box-shadow: var(--shadow-lg);
    }

    .accordion-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .accordion-item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .accordion-item.active {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(26,54,93,0.08);
    }

    .accordion-header {
      display: flex;
      align-items: center;
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      background: #f8f9fa;
      transition: background 0.2s;
      gap: 1rem;
      border: none;
      width: 100%;
      text-align: left;
    }

    .accordion-header:hover {
      background: #f0f3f7;
    }

    .accordion-item.active .accordion-header {
      background: #eef2f8;
      border-left: 3px solid var(--primary);
    }

    .q-icon {
      background: var(--primary);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .accordion-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
      line-height: 1.5;
      color: #334a6c;
    }

    .accordion-item.active .accordion-header h3 {
      color: var(--primary);
    }

    .toggle-icon {
      transition: transform 0.25s ease;
      font-size: 0.85rem;
      color: #adb5bd;
      flex-shrink: 0;
    }

    .accordion-item.active .toggle-icon {
      transform: rotate(180deg);
      color: var(--primary);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #fff;
    }

    .answer-wrapper {
      display: flex;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      border-top: 1px solid #e9ecef;
    }

    .a-icon {
      background: #2a9d5c;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .answer-content {
      flex: 1;
      line-height: 1.7;
      color: #4a5568;
      font-size: 0.95rem;
    }

    /* Quick Contact Sidebar */
    .quick-contact-sidebar {
      position: fixed;
      top: 50%;
      right: 40px;
      width: 240px;
      z-index: 100;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
      transform: translateY(-50%);
    }
    .contact-box {
      margin-bottom: 1rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .contact-box h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--primary);
    }
    .contact-box .phone-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }
    .contact-box .kakao-link {
      display: block;
      background-color: #ffeb00;
      padding: 1rem;
      text-decoration: none;
      color: #3c1e1e;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .contact-box .kakao-link:hover {
      background-color: #fdd835;
    }
    @media (max-width: 1200px) {
      .quick-contact-sidebar { display: none; }
    }

    /* 모바일 최적화 */
    @media (max-width: 768px) {
      .accordion-header {
        padding: 1rem 1.2rem;
        gap: 0.7rem;
      }
      .answer-wrapper {
        padding: 1rem 1.2rem;
        gap: 0.7rem;
      }
      .accordion-container {
        gap: 0.6rem;
      }
    }

    @media (max-width: 576px) {
      .accordion-header {
        padding: 0.9rem 1rem;
        gap: 0.6rem;
      }
      .accordion-header h3 {
        font-size: 0.9rem;
      }
      .q-icon, .a-icon {
        width: 24px;
        height: 24px;
        font-size: 0.8rem;
      }
      .answer-wrapper {
        padding: 0.9rem 1rem;
        gap: 0.6rem;
      }
      .answer-content {
        font-size: 0.9rem;
      }
      .accordion-container {
        gap: 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .accordion-header {
        padding: 0.8rem;
        gap: 0.5rem;
      }
      .accordion-header h3 {
        font-size: 0.85rem;
      }
      .answer-wrapper {
        padding: 0.8rem;
        gap: 0.5rem;
      }
      .answer-content {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <main>
    <section class="page-section">
      <div class="container">
        <div class="content-card">
          <div class="accordion-container">
            <!-- FAQ 데이터는 Supabase에서 동적으로 로드됩니다 -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="quick-contact-sidebar">
    <div class="contact-box">
      <h3>문의 전화</h3>
      <p class="phone-number"><i class="fas fa-phone-alt"></i> 031) 8003-2456</p>
    </div>
    <div class="contact-box" style="padding: 0;">
      <a href="https://pf.kakao.com/_ExlqgC" target="_blank" class="kakao-link"><strong>KakaoTalk</strong> <span>플러스 친구</span></a>
    </div>
  </aside>

  <footer class="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase-config.js"></script>

  <script>
    async function loadFAQData() {
      try {
        if (!window.supabaseClient) return;
        const { data, error } = await window.supabaseClient
          .from('qa')
          .select('*')
          .order('created_at', { ascending: true });

        if (error) return;

        const container = document.querySelector('.accordion-container');
        if (!container) return;

        data.forEach(faq => {
          const item = document.createElement('div');
          item.className = 'accordion-item';
          item.innerHTML = `
            <button type="button" class="accordion-header">
              <span class="q-icon">Q</span>
              <h3>${faq.question}</h3>
              <i class="fas fa-chevron-down toggle-icon"></i>
            </button>
            <div class="accordion-content">
              <div class="answer-wrapper">
                <span class="a-icon">A</span>
                <div class="answer-content">${faq.answer.replace(/\n/g, '<br>')}</div>
              </div>
            </div>
          `;
          container.appendChild(item);
        });

        initializeAccordion();
      } catch (e) {
        console.error('FAQ 데이터 로드 중 오류:', e);
      }
    }

    function initializeAccordion() {
      document.querySelectorAll('.accordion-header').forEach(header => {
        header.addEventListener('click', function () {
          const item = this.closest('.accordion-item');
          const content = item.querySelector('.accordion-content');
          const isActive = item.classList.contains('active');

          // 모두 닫기
          document.querySelectorAll('.accordion-item').forEach(el => {
            el.classList.remove('active');
            el.querySelector('.accordion-content').style.maxHeight = '0';
          });

          // 클릭한 항목 열기 (토글)
          if (!isActive) {
            item.classList.add('active');
            content.style.maxHeight = content.scrollHeight + 'px';
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(loadFAQData, 500);
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
