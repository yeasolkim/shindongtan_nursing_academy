<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:type" content="website">
  <meta property="og:title" content="갤러리 상세 - 신동탄간호학원">
  <meta property="og:description" content="신동탄간호학원 갤러리 사진 상세 보기.">
  <meta property="og:url" content="https://yeasolkim.github.io/shindongtan_nursing_academy/community_gallery_detail.html">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:image" content="https://yeasolkim.github.io/shindongtan_nursing_academy/shindongtan/resource/logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="갤러리 상세 - 신동탄간호학원">
  <meta name="twitter:description" content="신동탄간호학원 갤러리 사진 상세 보기.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="common-pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    /* 게시판 카드 hover 부유 효과 비활성화 */
    .content-card:hover {
      transform: none;
      box-shadow: var(--shadow-lg);
    }

    .gallery-detail-header {
      padding-bottom: 1.2rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e9ecef;
    }

    .gallery-detail-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 0.7rem;
      line-height: 1.4;
    }

    .gallery-detail-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.88rem;
      color: #868e96;
      flex-wrap: wrap;
    }

    .gallery-detail-meta .sep {
      color: #dee2e6;
    }

    /* 이미지 그룹 (script.js가 gallery-detail-image-group에 삽입) */
    .gallery-images {
      margin-bottom: 1.5rem;
    }

    .gallery-images img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: block;
    }

    .gallery-detail-text {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
      margin-bottom: 2rem;
    }

    /* Quill 에디터 내용 스타일 */
    .gallery-detail-text .ql-editor { padding: 0; }
    .gallery-detail-text .ql-editor p { margin-bottom: 1rem; }
    .gallery-detail-text .ql-editor h1,
    .gallery-detail-text .ql-editor h2,
    .gallery-detail-text .ql-editor h3 {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .gallery-detail-text .ql-editor h1 { font-size: 1.8rem; }
    .gallery-detail-text .ql-editor h2 { font-size: 1.5rem; }
    .gallery-detail-text .ql-editor h3 { font-size: 1.3rem; }
    .gallery-detail-text .ql-editor ul,
    .gallery-detail-text .ql-editor ol {
      margin-bottom: 1rem;
      padding-left: 2rem;
    }
    .gallery-detail-text .ql-editor li { margin-bottom: 0.5rem; }
    .gallery-detail-text .ql-editor blockquote {
      border-left: 4px solid #ddd;
      padding-left: 1rem;
      margin: 1rem 0;
      font-style: italic;
      color: #666;
    }
    .gallery-detail-text .ql-editor img {
      max-width: 100%;
      height: auto;
      margin: 1rem 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .gallery-detail-text .ql-editor a {
      color: var(--primary);
      text-decoration: underline;
    }
    .gallery-detail-text .ql-editor a:hover {
      color: var(--primary-dark);
    }

    /* 이전/목록/다음 네비게이션 */
    .gallery-detail-navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1.5rem;
      border-top: 1px solid #e9ecef;
      gap: 0.5rem;
    }

    .nav-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.2rem;
      border: 1px solid #dee2e6;
      background: #fff;
      color: #495057;
      text-decoration: none;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .nav-button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-button.list {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .nav-button.list:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: white;
    }

    .nav-button.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* 모바일 최적화 */
    @media (max-width: 768px) {
      .gallery-detail-title {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 576px) {
      .gallery-detail-title {
        font-size: 1.15rem;
      }
      .gallery-detail-navigation {
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .nav-button {
        flex: 1;
        justify-content: center;
        padding: 0.65rem 0.8rem;
        font-size: 0.85rem;
        min-width: 80px;
      }
    }

    @media (max-width: 480px) {
      .gallery-detail-navigation {
        flex-direction: column;
      }
      .nav-button {
        width: 100%;
      }
    }

    /* Quick Contact Sidebar */
    .quick-contact-sidebar {
      position: fixed;
      top: 50%;
      right: 40px;
      width: 240px;
      z-index: 100;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
      transform: translateY(-50%);
    }
    .contact-box {
      margin-bottom: 1rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .contact-box h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--primary);
    }
    .contact-box .phone-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }
    .contact-box .kakao-link {
      display: block;
      background-color: #ffeb00;
      padding: 1rem;
      text-decoration: none;
      color: #3c1e1e;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .contact-box .kakao-link:hover {
      background-color: #fdd835;
    }
    @media (max-width: 1200px) {
      .quick-contact-sidebar { display: none; }
    }
  </style>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>
<body>
  <header class="header"></header>
  <div id="page-hero-container"></div>

  <main id="main-content">
    <section class="page-section">
      <div class="container">
        <div class="content-card">
          <div class="gallery-detail-header">
            <h1 class="gallery-detail-title" id="gallery-detail-title">갤러리 제목</h1>
            <div class="gallery-detail-meta">
              <span id="gallery-detail-author">작성자</span>
              <span class="sep">·</span>
              <span id="gallery-detail-date">날짜</span>
              <span class="sep">·</span>
              <span>조회 <span id="gallery-detail-views">0</span></span>
            </div>
          </div>

          <div class="gallery-detail-content">
            <div id="gallery-detail-image-group" class="gallery-images"></div>
            <div class="gallery-detail-text" id="gallery-detail-text"></div>
          </div>

          <div class="gallery-detail-navigation">
            <a href="#" class="nav-button prev" id="prev-button">
              <i class="fas fa-chevron-left"></i> 이전글
            </a>
            <a href="community_gallery.html" class="nav-button list">
              <i class="fas fa-list"></i> 목록
            </a>
            <a href="#" class="nav-button next" id="next-button">
              다음글 <i class="fas fa-chevron-right"></i>
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="quick-contact-sidebar" aria-label="빠른 문의">
    <div class="contact-box">
      <h3>문의 전화</h3>
      <p class="phone-number"><i class="fas fa-phone-alt"></i> 031) 8003-2456</p>
    </div>
    <div class="contact-box" style="padding: 0;">
      <a href="https://pf.kakao.com/_ExlqgC" target="_blank" rel="noopener noreferrer" class="kakao-link"><strong>KakaoTalk</strong> <span>플러스 친구</span></a>
    </div>
  </aside>

  <footer class="footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js" defer></script>
  <script src="supabase-config.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
